groups:
  - name: infrastructure.rules
    interval: 30s

    rules:

      # --- CPU High Usage ---
      - alert: HighCPUUsage
        expr: |
          100 - (avg by(instance) (
            rate(node_cpu_seconds_total{mode="idle"}[5m])
          ) * 100) > 85
        for: 5m
        labels:
          severity: warning
          team: devops
        annotations:
          summary: "High CPU Usage on {{ $labels.instance }}"
          description: "CPU usage is {{ $value | humanize }}% (threshold: 85%)"

      # --- Memory High Usage ---
      - alert: HighMemoryUsage
        expr: |
          (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "High Memory on {{ $labels.instance }}"
          description: "Memory usage: {{ $value | humanize }}%"

      # --- Disk Full Soon ---
      - alert: DiskSpaceLow
        expr: |
          (1 - (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} 
          / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"})) * 100 > 80
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Disk space low on {{ $labels.instance }}: {{ $labels.mountpoint }}"
          description: "Disk usage is {{ $value | humanize }}%"

      # --- Instance Down ---
      - alert: InstanceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Instance {{ $labels.instance }} is DOWN"
          description: "Prometheus target is not reachable"

      - alert: TestSlackAlert
        expr: vector(1)
        for: 10s
        labels:
          severity: critical
        annotations:
          summary: "Test Alert"
          description: "This is a test alert to Slack 🚀"    